<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1020" />
    <title>CAATH – Offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050507;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #050507;
      }

      main {
        width: min(420px, calc(100vw - 40px));
        border: 1px solid #1e293b;
        background: #0b0d12;
        padding: 32px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      img {
        width: 76px;
        height: 76px;
        object-fit: contain;
      }

      h1 {
        margin: 20px 0 8px;
        color: #f2d675;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/branding/login-logo.png" alt="CAATH PMS" />
      <h1>CAATH PMS is offline</h1>
      <p>Your secure practice workspace will reconnect when your internet connection is restored.</p>
    </main>
  </body>
</html>
